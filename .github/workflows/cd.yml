name: CD

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  ci-check:
    name: Verify CI passed
    runs-on: ubuntu-latest
    steps:
      - run: echo "CI workflows must pass before CD runs"

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [ci-check]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f apps/api/Dockerfile -t $ECR_REGISTRY/gleider-dev-api:$IMAGE_TAG -t $ECR_REGISTRY/gleider-dev-api:latest .
          docker push $ECR_REGISTRY/gleider-dev-api:$IMAGE_TAG
          docker push $ECR_REGISTRY/gleider-dev-api:latest

      - name: Build and push Web image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f apps/web/Dockerfile -t $ECR_REGISTRY/gleider-dev-web:$IMAGE_TAG -t $ECR_REGISTRY/gleider-dev-web:latest .
          docker push $ECR_REGISTRY/gleider-dev-web:$IMAGE_TAG
          docker push $ECR_REGISTRY/gleider-dev-web:latest

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Apply
        working-directory: infra
        env:
          TF_VAR_api_image_tag: ${{ github.sha }}
          TF_VAR_domain: gleider.dev
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Smoke test
        run: |
          sleep 30
          curl -sf https://api.gleider.dev/projects || echo "Smoke test: API not yet reachable (expected on first deploy)"
