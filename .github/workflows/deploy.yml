name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-2
  ECR_WEB: gleider-dev-web
  ECR_API: gleider-dev-api

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        run: |
          docker build -f apps/api/Dockerfile -t ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_API }}:latest .
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_API }}:latest

      - name: Build and push Web image
        run: |
          docker build -f apps/web/Dockerfile --build-arg NEXT_PUBLIC_GA_MEASUREMENT_ID=G-Q7DBML61H0 -t ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_WEB }}:latest .
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_WEB }}:latest

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /home/ec2-user/

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: OAUTH_CLIENT_ID,OAUTH_CLIENT_SECRET,AUTH_SECRET,API_JWT_SECRET,ECR_REGISTRY,DATABASE_URL
          script: |
            aws ecr get-login-password --region us-east-2 | docker login --username AWS --password-stdin $ECR_REGISTRY
            cd /home/ec2-user
            echo "GITHUB_CLIENT_ID=$OAUTH_CLIENT_ID" > .env
            echo "GITHUB_CLIENT_SECRET=$OAUTH_CLIENT_SECRET" >> .env
            echo "AUTH_SECRET=$AUTH_SECRET" >> .env
            echo "API_JWT_SECRET=$API_JWT_SECRET" >> .env
            echo "ECR_REGISTRY=$ECR_REGISTRY" >> .env
            echo "DATABASE_URL=$DATABASE_URL" >> .env
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
        env:
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          API_JWT_SECRET: ${{ secrets.API_JWT_SECRET }}
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id E2XC1C826XLF86 --paths "/*"
