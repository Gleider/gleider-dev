services:
  api:
    image: ${ECR_REGISTRY}/gleider-dev-api:latest
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      PORT: '3001'
      API_JWT_SECRET: ${API_JWT_SECRET}
      WEB_URL: https://gleider.dev

  web:
    image: ${ECR_REGISTRY}/gleider-dev-web:latest
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:3001
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      AUTH_SECRET: ${AUTH_SECRET}
      API_JWT_SECRET: ${API_JWT_SECRET}
      AUTH_URL: https://gleider.dev
      AUTH_TRUST_HOST: 'true'
    depends_on:
      - api
